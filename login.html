<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Learncare Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="login-left">
                <h2>Welcome back!</h2>
                <p>Continue your English journey with confidence.</p>
            </div>
            
            <div class="login-right">
                <h3>Sign In</h3>
                <form onsubmit="handleLogin(event)">
                    <input type="email" placeholder="Email" value="student@example.com" required>
                    <input type="password" placeholder="Password" value="demo123" required>
                    <button type="submit">Sign In</button>
                </form>
                <p>Don't have an account? <a href="register.html">Register Now</a></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
