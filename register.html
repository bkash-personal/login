<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • Learncare Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <a href="index.html" class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-teal-800 rounded-2xl flex items-center justify-center">
                        <span class="text-white text-3xl font-bold tracking-tighter">LC</span>
                    </div>
                    <div>
                        <span class="font-bold text-3xl tracking-tight text-gray-900">Learncare</span>
                        <span class="font-semibold text-teal-700 text-xl">Academy</span>
                    </div>
                </a>
            </div>
            <div>
                <a href="index.html" class="px-5 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors">
                    ← Back to Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Register Section -->
    <div class="min-h-[calc(100vh-73px)] flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-5xl">
            <div class="grid md:grid-cols-5 shadow-xl border border-gray-100 rounded-3xl overflow-hidden bg-white">
                
                <!-- Left Side -->
                <div class="md:col-span-2 login-bg text-white p-10 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-x-3 mb-8">
                            <div class="w-9 h-9 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center">
                                <span class="text-white text-3xl font-bold">LC</span>
                            </div>
                            <span class="font-bold text-3xl">Learncare</span>
                        </div>
                        
                        <h1 class="text-4xl leading-tight font-bold tracking-tight">
                            Start your<br>
                            English journey<br>
                            today.
                        </h1>
                        
                        <p class="mt-6 text-teal-200 text-lg">
                            Join 2,400+ students building unstoppable confidence.
                        </p>
                    </div>
                    
                    <div class="mt-auto pt-8">
                        <div class="flex items-center gap-x-4">
                            <div>
                                <div class="text-sm text-teal-200">Already have an account?</div>
                                <a href="login.html" class="font-semibold text-white">Login here →</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Register Form -->
                <div class="md:col-span-3 p-10 md:p-12">
                    <div class="max-w-md mx-auto">
                        
                        <div class="mb-8">
                            <h2 class="text-3xl font-bold tracking-tight text-gray-900">Create your account</h2>
                            <p class="text-gray-500 mt-2">Get started in less than 30 seconds</p>
                        </div>
                        
                        <form id="register-form" onsubmit="handleRegister(event)">
                            
                            <div class="grid grid-cols-2 gap-4 mb-5">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label>
                                    <input type="text" id="first-name" value="Rahim" required
                                           class="form-input w-full px-4 py-3.5 border border-gray-300 rounded-2xl text-sm">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
                                    <input type="text" id="last-name" value="Ahmed" required
                                           class="form-input w-full px-4 py-3.5 border border-gray-300 rounded-2xl text-sm">
                                </div>
                            </div>
                            
                            <div class="mb-5">
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-gray-400"></i>
                                    </div>
                                    <input type="email" id="reg-email" value="rahim.ahmed@example.com" required
                                           class="form-input w-full pl-11 pr-4 py-3.5 border border-gray-300 rounded-2xl text-sm">
                                </div>
                            </div>
                            
                            <div class="mb-5">
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <i class="fas fa-lock text-gray-400"></i>
                                    </div>
                                    <input type="password" id="reg-password" value="demo123" required
                                           class="form-input w-full pl-11 pr-4 py-3.5 border border-gray-300 rounded-2xl text-sm">
                                    <button type="button" onclick="togglePasswordRegister()" 
                                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                                        <i class="fas fa-eye" id="reg-password-icon"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="mb-6">
                                <label class="flex items-center cursor-pointer">
                                    <input type="checkbox" checked class="accent-teal-700 w-4 h-4">
                                    <span class="ml-2 text-sm text-gray-600">I agree to the <a href="#" class="text-teal-700 hover:underline">Terms &amp; Conditions</a></span>
                                </label>
                            </div>
                            
                            <button type="submit" 
                                    class="w-full py-[15px] bg-teal-700 hover:bg-teal-800 transition-all font-semibold text-white rounded-2xl flex items-center justify-center gap-x-2 text-base shadow-sm">
                                <span>Create Account</span>
                            </button>
                            
                        </form>
                        
                        <div class="mt-7 text-center">
                            <p class="text-sm text-gray-600">
                                Already have an account? 
                                <a href="login.html" class="font-semibold text-teal-700">Login</a>
                            </p>
                        </div>
                        
                    </div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <!-- Toast -->
    <div id="success-toast" class="hidden fixed bottom-5 right-5 bg-white border shadow-xl px-5 py-3.5 rounded-2xl flex items-center gap-x-3 z-50 max-w-xs">
        <div class="flex items-center">
            <i class="fas fa-check-circle text-emerald-500 text-xl mr-3"></i>
            <div>
                <span id="toast-message" class="font-semibold text-sm"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
